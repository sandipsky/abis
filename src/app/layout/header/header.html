<header class="header">
    <div class="breadcrumb-group">
        <h1 class="breadcrumb-title">{{ breadcrumbs()?.label }}</h1>

        <div class="d-flex align-items-center gap-sm">
            <span class="breadcrumb-sub-title">HOME</span>
            <img class="caret" src="../../../svg/caret.svg" alt="">

            @if(breadcrumbs()?.prefix) {
            <span class="breadcrumb-sub-title">{{ breadcrumbs()?.prefix }}</span>
            <img class="caret" src="../../../svg/caret.svg" alt="">
            }

            @if(breadcrumbs(); as crumbs) {
            <a class="breadcrumb-sub-title active" [routerLink]="crumbs.link">
                {{ crumbs.label }}
            </a>
            }
        </div>
    </div>

    <div class="chip primary">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M6 2.25H4.5C3.25736 2.25 2.25 3.25736 2.25 4.5V6.75M6 2.25V1.5M6 2.25H12M6 2.25V3M12 2.25H13.5C14.7426 2.25 15.75 3.25736 15.75 4.5V6.75M12 2.25V1.5M12 2.25V3M2.25 6.75V14.25C2.25 15.4926 3.25736 16.5 4.5 16.5H13.5C14.7426 16.5 15.75 15.4926 15.75 14.25V6.75M2.25 6.75H15.75"
                stroke="#AB20A9" stroke-width="1.5" stroke-linecap="round" />
        </svg>

        Fiscal Year: 2082-83
    </div>

    <img src="../../../svg/calculator.svg" alt="">
    <img src="../../../svg/notification.svg" alt="">
    <img src="../../../svg/printer.svg" alt="">

    <div class="profile">
        <img class="profile-image" src="../../../img/profile.png" alt="">

        <div class="profile-dropdown">
            <div class="profile-container">
                <img class="profile-image" src="../../../img/profile.png" alt="">

                <div class="profile-desc">
                    <h1 class="profile-name">Sandip Shakya</h1>
                    <h3 class="profile-role">Admin</h3>
                </div>
            </div>

            <div class="profile-content">
                <div class="profile-item">
                    <img src="../../../svg/logout.svg" alt="">

                    <span>Logout</span>
                </div>
            </div>
        </div>
    </div>
</header>
